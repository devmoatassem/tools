<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Generator</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #2d3a4f;
            --border: #d1d5db;
            --bg-light: #f9fafb;
            --text: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --highlight: #f0f4ff;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --radius: 8px;
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: #e8ecf1;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px 60px;
            min-height: 100vh;
        }

        /* ── Toolbar ─────────────────────── */
        .toolbar {
            position: sticky;
            top: 16px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
            background: var(--white);
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            border: 1px solid #e5e7eb;
        }
        .toolbar button {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-add {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-add:hover {
            background: #2d3a4f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.3);
        }
        .btn-print {
            background: #ffffff;
            color: #1a1a2e;
            border: 2px solid #1a1a2e !important;
        }
        .btn-print:hover {
            background: #1a1a2e;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.25);
        }
        .btn-reset {
            background: #ffffff;
            color: #6b7280;
            border: 2px solid #e5e7eb !important;
        }
        .btn-reset:hover {
            background: #f3f4f6;
            border-color: #d1d5db !important;
        }

        /* ── Invoice Container ──────────── */
        .invoice-wrapper {
            width: 100%;
            max-width: 820px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }
        .invoice {
            padding: 50px 56px 44px;
        }

        /* ── Header ────────────────────── */
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 36px;
            padding-bottom: 28px;
            border-bottom: 2px solid #e5e7eb;
        }
        .invoice-header .brand {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .invoice-header .brand span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            font-family: var(--font-body);
            letter-spacing: 0;
            margin-top: 2px;
        }
        .invoice-badge {
            text-align: right;
            flex-shrink: 0;
        }
        .invoice-badge .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 2px;
        }
        .invoice-badge .number {
            font-family: var(--font-mono);
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* ── Address Grid ──────────────── */
        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 30px;
        }
        .address-block {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 20px 22px;
            border: 1px solid #eef0f3;
        }
        .address-block .tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .address-block input,
        .address-block textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            resize: vertical;
            padding: 2px 0;
            line-height: 1.6;
            outline: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s;
        }
        .address-block input:focus,
        .address-block textarea:focus {
            border-bottom-color: #c7cdd6;
        }
        .address-block input {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 2px;
        }
        .address-block textarea {
            font-size: 13px;
            min-height: 40px;
        }

        /* ── Meta Row ──────────────────── */
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }
        .meta-item {
            flex: 1;
            min-width: 130px;
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 14px 18px;
            border: 1px solid #eef0f3;
        }
        .meta-item label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .meta-item input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
            outline: none;
            padding: 2px 0;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s;
        }
        .meta-item input:focus {
            border-bottom-color: #c7cdd6;
        }
        .meta-item input[type="date"] {
            font-family: var(--font-mono);
            cursor: pointer;
        }

        /* ── Table ─────────────────────── */
        .invoice-table-wrap {
            overflow-x: auto;
            margin-bottom: 24px;
            border-radius: var(--radius);
            border: 1px solid #eef0f3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }
        thead th {
            background: #f4f5f7;
            text-align: left;
            padding: 14px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--text-muted);
            font-weight: 700;
            border-bottom: 2px solid #e5e7eb;
            white-space: nowrap;
        }
        thead th:last-child {
            text-align: right;
        }
        thead th:nth-child(3),
        thead th:nth-child(4) {
            text-align: center;
            width: 100px;
        }
        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f1f3;
            vertical-align: top;
        }
        tbody tr {
            transition: background 0.15s;
        }
        tbody tr:hover {
            background: #fafbfc;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
        tbody td input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            padding: 6px 8px;
            border-radius: 4px;
            outline: none;
            transition: all 0.15s;
        }
        tbody td input:focus {
            border-color: #cbd5e1;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(203, 213, 225, 0.2);
        }
        tbody td input.input-hours,
        tbody td input.input-rate {
            text-align: center;
            font-family: var(--font-mono);
            font-weight: 500;
        }
        tbody td .amount-display {
            text-align: right;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            padding: 6px 8px;
        }
        tbody td:last-child {
            text-align: right;
        }
        .btn-remove-row {
            background: none;
            border: none;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 18px;
            padding: 6px 10px;
            border-radius: 50%;
            transition: all 0.2s;
            line-height: 1;
            vertical-align: middle;
        }
        .btn-remove-row:hover {
            color: #ef4444;
            background: #fef2f2;
        }
        .empty-row-msg {
            text-align: center;
            padding: 36px;
            color: #cbd5e1;
            font-style: italic;
            font-size: 14px;
        }

        /* ── Totals Section ────────────── */
        .totals-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 32px;
        }
        .totals-box {
            width: 280px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid #eef0f3;
        }
        .totals-box .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px;
            font-size: 14px;
            border-bottom: 1px solid #f0f1f3;
            background: #fafbfc;
        }
        .totals-box .row:last-child {
            border-bottom: none;
            background: #f0f4ff;
            font-weight: 700;
            font-size: 17px;
            color: var(--primary);
            font-family: var(--font-mono);
            letter-spacing: -0.3px;
        }
        .totals-box .row:last-child .label {
            font-family: var(--font-body);
            letter-spacing: 0;
            font-size: 14px;
            color: var(--text);
        }
        .totals-box .label {
            color: var(--text-muted);
            font-weight: 500;
        }
        .totals-box .value {
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--text);
        }

        /* ── Notes ────────────────────── */
        .notes-section {
            border-top: 2px solid #e5e7eb;
            padding-top: 22px;
            margin-bottom: 10px;
        }
        .notes-section label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--text-muted);
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
        }
        .notes-section textarea {
            width: 100%;
            border: 1px solid #eef0f3;
            border-radius: var(--radius);
            padding: 14px 16px;
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text);
            resize: vertical;
            min-height: 70px;
            background: var(--bg-light);
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        .notes-section textarea:focus {
            border-color: #cbd5e1;
            background: #fff;
        }

        /* ── Footer ───────────────────── */
        .invoice-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
            font-family: var(--font-body);
        }

        /* ── Print Styles ─────────────── */
        @media print {
            body {
                background: #fff;
                padding: 0;
                margin: 0;
            }
            .toolbar {
                display: none !important;
            }
            .invoice-wrapper {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                width: 100%;
            }
            .invoice {
                padding: 30px 36px;
            }
            .address-block,
            .meta-item,
            .notes-section textarea,
            .invoice-table-wrap,
            .totals-box {
                border: 1px solid #ddd;
            }
            .address-block input,
            .address-block textarea,
            .meta-item input,
            tbody td input {
                border-bottom: none !important;
            }
            tbody td input:focus {
                border-color: transparent;
                box-shadow: none;
                background: transparent;
            }
            .btn-remove-row {
                display: none !important;
            }
            thead th {
                background: #eee !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .totals-box .row:last-child {
                background: #eef2ff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            @page {
                margin: 0.4in;
                size: letter;
            }
        }

        @media (max-width: 640px) {
            .invoice {
                padding: 28px 18px;
            }
            .address-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .invoice-header {
                flex-direction: column;
                gap: 10px;
            }
            .invoice-badge {
                text-align: left;
            }
            .totals-section {
                justify-content: stretch;
            }
            .totals-box {
                width: 100%;
            }
            .meta-row {
                flex-direction: column;
                gap: 10px;
            }
            .toolbar {
                border-radius: 20px;
                padding: 10px 14px;
                gap: 6px;
            }
            .toolbar button {
                padding: 8px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── Toolbar ───────────────────── -->
    <div class="toolbar">
        <button class="btn-add" onclick="addRow()" title="Add a new line item">
            ➕ Add Line Item
        </button>
        <button class="btn-print" onclick="window.print()" title="Print or save as PDF">
            🖨️ Print / PDF
        </button>
        <button class="btn-reset" onclick="resetInvoice()" title="Clear all line items">
            🔄 Reset Lines
        </button>
    </div>

    <!-- ─── Invoice ──────────────────── -->
    <div class="invoice-wrapper">
        <div class="invoice" id="invoiceContainer">

            <!-- Header -->
            <div class="invoice-header">
                <div class="brand">
                    INVOICE
                    <span>Freelance Professional Services</span>
                </div>
                <div class="invoice-badge">
                    <div class="label">Invoice #</div>
                    <div class="number">
                        <input type="text" id="invoiceNumber" value="INV-2026-001" style="border:none;background:transparent;font-family:inherit;font-size:inherit;font-weight:inherit;color:inherit;width:180px;text-align:right;outline:none;border-bottom:1px dashed transparent;" onfocus="this.style.borderBottomColor='#c7cdd6'" onblur="this.style.borderBottomColor='transparent'">
                    </div>
                </div>
            </div>

            <!-- Address Grid -->
            <div class="address-grid">
                <!-- From: Individual / Freelancer -->
                <div class="address-block">
                    <div class="tag">From</div>
                    <input type="text" id="fromName" value="Alex Morgan" placeholder="Your Full Name">
                    <textarea id="fromAddress" rows="2" placeholder="Your address, city, state, zip">123 Maple Street, Apt 4B&#10;Brooklyn, NY 11201</textarea>
                    <input type="text" id="fromEmail" value="alex.morgan@email.com" placeholder="your@email.com" style="font-size:13px;color:#6b7280;">
                    <input type="text" id="fromPhone" value="(917) 555-0142" placeholder="Phone number" style="font-size:13px;color:#6b7280;">
                </div>

                <!-- To: Client -->
                <div class="address-block">
                    <div class="tag">Bill To</div>
                    <input type="text" id="toName" value="Jordan Ellis" placeholder="Client Name">
                    <textarea id="toAddress" rows="2" placeholder="Client address, city, state, zip">456 Park Avenue, Suite 200&#10;New York, NY 10022</textarea>
                    <input type="text" id="toEmail" value="jordan.ellis@client.com" placeholder="client@email.com" style="font-size:13px;color:#6b7280;">
                </div>
            </div>

            <!-- Meta Row -->
            <div class="meta-row">
                <div class="meta-item">
                    <label>Invoice Date</label>
                    <input type="date" id="invoiceDate">
                </div>
                <div class="meta-item">
                    <label>Due Date</label>
                    <input type="date" id="dueDate">
                </div>
                <div class="meta-item">
                    <label>Payment Terms</label>
                    <input type="text" id="paymentTerms" value="Net 15 Days" placeholder="e.g. Net 15">
                </div>
                <div class="meta-item">
                    <label>Currency</label>
                    <input type="text" id="currency" value="USD ($)" placeholder="USD ($)">
                </div>
            </div>

            <!-- Line Items Table -->
            <div class="invoice-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40%;">Description</th>
                            <th style="width:15%;text-align:center;">Hours</th>
                            <th style="width:18%;text-align:center;">Hourly Rate</th>
                            <th style="width:18%;text-align:right;">Amount</th>
                            <th style="width:9%;"></th>
                        </tr>
                    </thead>
                    <tbody id="lineItemsBody">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
                <div id="emptyMessage" class="empty-row-msg" style="display:none;">
                    No line items yet. Click <strong>"Add Line Item"</strong> to begin.
                </div>
            </div>

            <!-- Totals -->
            <div class="totals-section">
                <div class="totals-box">
                    <div class="row">
                        <span class="label">Subtotal</span>
                        <span class="value" id="subtotalDisplay">$0.00</span>
                    </div>
                    <div class="row">
                        <span class="label">Tax (0%)</span>
                        <span class="value" id="taxDisplay">$0.00</span>
                    </div>
                    <div class="row">
                        <span class="label">Grand Total</span>
                        <span class="value" id="grandTotalDisplay">$0.00</span>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="notes-section">
                <label>Notes / Payment Instructions</label>
                <textarea id="notesArea" placeholder="Thank you for your business! Please make payment via bank transfer or check.&#10;Bank: Chase | Account: ****1234 | Routing: 021000021">Thank you for your business! Please make payment via bank transfer or check.
                    Bank: Chase | Account: ****1234 | Routing: 021000021</textarea>
                </div>

                <!-- Footer -->
                <div class="invoice-footer">
                    This invoice was generated for <strong id="footerName">Alex Morgan</strong> — Freelance Professional
                </div>
            </div>
        </div>

        <script>
            // ──────────────────────────────────────
            //  DATA & STATE
            // ──────────────────────────────────────
            let lineItems = [];
            let itemIdCounter = 0;

            // ──────────────────────────────────────
            //  INITIALIZATION
            // ──────────────────────────────────────
            function init() {
                // Set today's date and due date (15 days out)
                const today = new Date();
                const dueDate = new Date(today);
                dueDate.setDate(dueDate.getDate() + 15);

                document.getElementById('invoiceDate').value = formatDate(today);
                document.getElementById('dueDate').value = formatDate(dueDate);

                // Start with 2 sample rows
                addRow(true);
                addRow(true);

                // Update footer name on input change
                document.getElementById('fromName').addEventListener('input', updateFooterName);
                updateFooterName();

                // Recalculate on any relevant input change (delegation)
                document.getElementById('lineItemsBody').addEventListener('input', function(e) {
                    if (e.target.classList.contains('input-hours') ||
                        e.target.classList.contains('input-rate') ||
                        e.target.classList.contains('input-desc')) {
                        recalcAll();
                    }
                });

                recalcAll();
            }

            function formatDate(date) {
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            }

            function updateFooterName() {
                const name = document.getElementById('fromName').value || 'the service provider';
                document.getElementById('footerName').textContent = name;
            }

            // ──────────────────────────────────────
            //  ADD / REMOVE ROWS
            // ──────────────────────────────────────
            function addRow(silent = false) {
                itemIdCounter++;
                const id = itemIdCounter;
                const defaultRate = 75.00; // sensible default hourly rate

                const item = {
                    id: id,
                    description: '',
                    hours: 0,
                    rate: defaultRate,
                };

                lineItems.push(item);
                renderRow(item);
                recalcAll();
                hideEmptyMessage();

                // Focus the description field of the new row
                if (!silent) {
                    const descInput = document.getElementById(`desc-${id}`);
                    if (descInput) {
                        setTimeout(() => descInput.focus(), 50);
                    }
                }
            }

            function removeRow(id, buttonElement) {
                if (lineItems.length <= 1) {
                    // Keep at least one row
                    const row = buttonElement.closest('tr');
                    if (row) {
                        row.style.transition = 'all 0.2s';
                        row.style.opacity = '0.4';
                        row.style.transform = 'scale(0.97)';
                        setTimeout(() => {
                            row.style.opacity = '1';
                            row.style.transform = 'scale(1)';
                        }, 200);
                    }
                    return;
                }

                const row = buttonElement.closest('tr');
                if (row) {
                    row.style.transition = 'all 0.25s';
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(-30px)';
                    row.style.maxHeight = row.offsetHeight + 'px';
                    row.style.overflow = 'hidden';
                    requestAnimationFrame(() => {
                        row.style.maxHeight = '0';
                        row.style.paddingTop = '0';
                        row.style.paddingBottom = '0';
                        row.style.border = 'none';
                    });
                    setTimeout(() => {
                        row.remove();
                        lineItems = lineItems.filter(item => item.id !== id);
                        recalcAll();
                        if (lineItems.length === 0) {
                            showEmptyMessage();
                        }
                    }, 280);
                } else {
                    lineItems = lineItems.filter(item => item.id !== id);
                    recalcAll();
                    if (lineItems.length === 0) {
                        showEmptyMessage();
                    }
                }
            }

            function renderRow(item) {
                const tbody = document.getElementById('lineItemsBody');
                const tr = document.createElement('tr');
                tr.setAttribute('data-item-id', item.id);
                tr.innerHTML = `
                    <td>
                        <input type="text" class="input-desc" id="desc-${item.id}" 
                               value="${escapeHTML(item.description)}" 
                               placeholder="e.g. Web design, consultation, content writing...">
                    </td>
                    <td style="text-align:center;">
                        <input type="number" class="input-hours" id="hours-${item.id}" 
                               value="${item.hours}" min="0" step="0.25" 
                               placeholder="0.00" style="width:80px;">
                    </td>
                    <td style="text-align:center;">
                        <input type="number" class="input-rate" id="rate-${item.id}" 
                               value="${item.rate}" min="0" step="0.01" 
                               placeholder="0.00" style="width:90px;">
                    </td>
                    <td style="text-align:right;">
                        <span class="amount-display" id="amount-${item.id}">$0.00</span>
                    </td>
                    <td style="text-align:center;">
                        <button class="btn-remove-row" onclick="removeRow(${item.id}, this)" 
                                title="Remove this line" aria-label="Remove line">
                            ✕
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);

                // Wire up input listeners for this row
                const hoursInput = tr.querySelector('.input-hours');
                const rateInput = tr.querySelector('.input-rate');
                const descInput = tr.querySelector('.input-desc');

                hoursInput.addEventListener('input', function() {
                    updateItemFromDOM(item.id);
                    recalcAll();
                });
                rateInput.addEventListener('input', function() {
                    updateItemFromDOM(item.id);
                    recalcAll();
                });
                descInput.addEventListener('input', function() {
                    updateItemFromDOM(item.id);
                });
            }

            function updateItemFromDOM(id) {
                const item = lineItems.find(i => i.id === id);
                if (!item) return;

                const descInput = document.getElementById(`desc-${id}`);
                const hoursInput = document.getElementById(`hours-${id}`);
                const rateInput = document.getElementById(`rate-${id}`);

                if (descInput) item.description = descInput.value;
                if (hoursInput) item.hours = parseFloat(hoursInput.value) || 0;
                if (rateInput) item.rate = parseFloat(rateInput.value) || 0;

                // Update the amount display for this row
                const amountDisplay = document.getElementById(`amount-${id}`);
                if (amountDisplay) {
                    const amt = item.hours * item.rate;
                    amountDisplay.textContent = formatCurrency(amt);
                }
            }

            function recalcAll() {
                // Update all items from DOM first
                lineItems.forEach(item => updateItemFromDOM(item.id));

                // Calculate totals
                let subtotal = 0;
                lineItems.forEach(item => {
                    subtotal += item.hours * item.rate;
                });

                const taxRate = 0; // 0% tax (can be adjusted)
                const tax = subtotal * taxRate;
                const grandTotal = subtotal + tax;

                document.getElementById('subtotalDisplay').textContent = formatCurrency(subtotal);
                document.getElementById('taxDisplay').textContent = formatCurrency(tax);
                document.getElementById('grandTotalDisplay').textContent = formatCurrency(grandTotal);

                // Update all individual amount displays
                lineItems.forEach(item => {
                    const amountDisplay = document.getElementById(`amount-${item.id}`);
                    if (amountDisplay) {
                        amountDisplay.textContent = formatCurrency(item.hours * item.rate);
                    }
                });
            }

            function formatCurrency(amount) {
                return '$' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function hideEmptyMessage() {
                document.getElementById('emptyMessage').style.display = 'none';
            }

            function showEmptyMessage() {
                document.getElementById('emptyMessage').style.display = 'block';
            }

            // ──────────────────────────────────────
            //  RESET
            // ──────────────────────────────────────
            function resetInvoice() {
                if (lineItems.length > 0) {
                    if (!confirm('Clear all line items? This cannot be undone.')) return;
                }
                // Clear all rows
                const tbody = document.getElementById('lineItemsBody');
                tbody.innerHTML = '';
                lineItems = [];
                itemIdCounter = 0;
                showEmptyMessage();
                recalcAll();
                // Re-add two fresh rows
                addRow(true);
                addRow(true);
                recalcAll();
                hideEmptyMessage();
            }

            // ──────────────────────────────────────
            //  KEYBOARD SHORTCUTS
            // ──────────────────────────────────────
            document.addEventListener('keydown', function(e) {
                // Ctrl/Cmd + Enter = Add new row
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    addRow();
                }
                // Ctrl/Cmd + P = Print
                if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                    // Let the default print dialog handle it — no need to override
                }
            });

            // ──────────────────────────────────────
            //  STARTUP
            // ──────────────────────────────────────
            document.addEventListener('DOMContentLoaded', init);
        </script>
    </body>
    </html>
